<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC_ARCHITECT | Enterprise Resilience Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --azure-blue: #0078d4;
            --deep-navy: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-sub: #8892b0;
            --border: rgba(136, 146, 176, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--deep-navy); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; }

        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--azure-blue); }

        .solutions-container { max-width: 1200px; margin: 4rem auto; padding: 0 2rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            justify-items: center;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--azure-blue); }

        .card-icon { color: var(--azure-blue); margin-bottom: 1.5rem; text-align: center; }
        .card h3 { font-size: 1.6rem; color: #fff; margin-bottom: 2rem; text-align: center; }

        .bullet-item { margin-bottom: 1.5rem; }
        .bullet-title { color: var(--azure-blue); font-weight: 700; display: block; margin-bottom: 0.3rem; }
        .bullet-desc { color: var(--text-sub); font-size: 0.95rem; display: block; }

        .card-label {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--azure-blue);
            text-align: center;
            letter-spacing: 1px;
        }

        footer {
            margin-top: 6rem;
            padding: 4rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-linkedin {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-linkedin:hover { color: var(--azure-blue); }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .card { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">SEC_<span>ARCHITECT</span></a>

        </a>
    </header>

</html>
