<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | SEC_ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azure-blue: #0078d4;
            --deep-navy: #0a192f;
            --card-bg: #112240;
            --accent-cyan: #64ffda;
            --text-main: #e6f1ff;
            --text-sub: #8892b0;
        }

        [data-theme="light"] {
            --deep-navy: #fafafa;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
        }

        body {
            background-color: var(--deep-navy);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            right: 0;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--card-bg);
        }

        h1 { color: #fff; text-align: center; margin-bottom: 2rem; margin-top: 4rem; }
        .post { background: var(--card-bg); padding: 1rem; margin: 1rem 0; border-radius: 8px; }
        .post a { color: var(--accent-cyan); text-decoration: none; }
        .post a:hover { text-decoration: underline; }
    </style>
</head>
<body data-theme="dark">
    <header>
        <button class="theme-toggle" data-set-theme="light" title="Cambiar a modo claro">☀️</button>
    </header>
    <h1>Blog de SEC_ARCHITECT</h1>
    <div class="post">
        <h2><a href="identidad-vs-cuenta/">Identidad vs Cuenta</a></h2>
        <p>Explorando las diferencias entre identidad y cuenta en arquitectura de seguridad.</p>
    </div>
    <script>
        document.querySelectorAll("[data-set-theme]").forEach(btn => {
            btn.addEventListener("click", () => {
                const theme = btn.getAttribute("data-set-theme");
                document.body.setAttribute("data-theme", theme);
                // Toggle the button
                if (theme === "light") {
                    btn.setAttribute("data-set-theme", "dark");
                    btn.textContent = "🌙";
                    btn.title = "Cambiar a modo oscuro";
                } else {
                    btn.setAttribute("data-set-theme", "light");
                    btn.textContent = "☀️";
                    btn.title = "Cambiar a modo claro";
                }
            });
        });
    </script>
</body>
</html>
