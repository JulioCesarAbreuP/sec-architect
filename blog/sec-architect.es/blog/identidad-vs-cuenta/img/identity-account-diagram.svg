<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; fill: #e6f1ff; }
      .box { fill: #112240; stroke: #64ffda; stroke-width: 2; }
      .arrow { stroke: #0078d4; stroke-width: 3; marker-end: url(#arrowhead); }
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#0078d4" />
      </marker>
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a192f"/>
  
  <!-- Identity Box -->
  <rect x="50" y="100" width="150" height="80" class="box"/>
  <text x="125" y="135" text-anchor="middle" class="text">IDENTIDAD</text>
  <text x="125" y="155" text-anchor="middle" class="text" font-size="12">Quién eres</text>
  
  <!-- Account Box -->
  <rect x="400" y="100" width="150" height="80" class="box"/>
  <text x="475" y="135" text-anchor="middle" class="text">CUENTA</text>
  <text x="475" y="155" text-anchor="middle" class="text" font-size="12">Cómo accedes</text>
  
  <!-- Arrow -->
  <line x1="200" y1="140" x2="400" y2="140" class="arrow"/>
  
  <!-- Labels -->
  <text x="300" y="125" text-anchor="middle" class="text" font-size="12">1:N</text>
  <text x="300" y="165" text-anchor="middle" class="text" font-size="10">Una identidad puede tener</text>
  <text x="300" y="180" text-anchor="middle" class="text" font-size="10">múltiples cuentas</text>
</svg>