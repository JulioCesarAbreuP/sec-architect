<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Identidad vs Cuenta vs Credencial</title>

<!-- Seguridad y buenas prácticas -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'self'; upgrade-insecure-requests;" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="X-Frame-Options" content="DENY" />
<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
<meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains" />
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta name="description" content="Diferencia arquitectónica entre identidad, cuenta y credencial. El modelo mental correcto para diseñar seguridad moderna." />

<!-- Estilo mínimo para lectura -->
<style>

/* VARIABLES BASE (modo claro por defecto) */
:root {
--bg: #fafafa;
--text: #1a1a1a;
--card: #ffffff;
--accent: #0078d4;
}

/* MODO OSCURO */
[data-theme="dark"] {
--bg: #0f0f0f;
--text: #e6e6e6;
--card: #1a1a1a;
--accent: #4da3ff;
}

/* ESTILO BASE MOBILE-FIRST */
body {
background: var(--bg);
color: var(--text);
font-family: "Segoe UI", system-ui, sans-serif;
max-width: 820px;
margin: 0 auto;
padding: 20px;
line-height: 1.75;
transition: background 0.3s ease, color 0.3s ease;
}

header {
text-align: center;
margin-bottom: 2rem;
position: relative;
}

.theme-toggle {
position: absolute;
top: 0;
right: 0;
background: none;
border: none;
color: var(--text);
font-size: 1.5rem;
cursor: pointer;
padding: 0.5rem;
border-radius: 4px;
transition: background 0.2s ease;
}

.theme-toggle:hover {
background: var(--card);
}

/* SELECTOR DE MODO */
.theme-switcher {
display: flex;
gap: 10px;
margin: 20px 0 30px 0;
}

.theme-switcher button {
padding: 8px 14px;
border: none;
border-radius: 6px;
background: var(--card);
color: var(--text);
cursor: pointer;
font-size: 0.9rem;
transition: background 0.2s ease, transform 0.1s ease;
}

.theme-switcher button:hover {
background: var(--accent);
color: white;
transform: translateY(-2px);
}

/* TITULOS FLUIDOS */
h1 {
font-size: clamp(1.8rem, 4vw, 2.4rem);
font-weight: 700;
margin-top: 20px;
margin-bottom: 10px;
}

h2 {
font-size: clamp(1.3rem, 3vw, 1.6rem);
margin-top: 40px;
margin-bottom: 12px;
}

/* TEXTO */
p {
margin-bottom: 20px;
font-size: clamp(1rem, 2.5vw, 1.08rem);
}

/* LISTAS */
ul {
margin-bottom: 20px;
padding-left: 20px;
}

li {
margin-bottom: 8px;
}

/* IMAGEN DESTACADA */
.hero-image {
width: 100%;
height: auto;
background-color: var(--card);
border-radius: 8px;
overflow: hidden;
margin: 25px 0 40px 0;
display: flex;
align-items: center;
justify-content: center;
}

.hero-image img {
width: 100%;
height: auto;
object-fit: cover;
}

/* DIVISOR */
.divider {
height: 1px;
background: #ccc;
margin: 40px 0;
}

/* FOOTER — MISMO ESTILO QUE LA PORTADA */
.site-footer {
margin-top: 60px;
padding: 40px 0 30px 0;
text-align: center;
color: var(--text);
opacity: 0.85;
}

.footer-content {
display: flex;
flex-direction: column;
align-items: center;
gap: 18px;
}

.footer-icons {
display: flex;
gap: 22px;
}

.footer-icon {
font-family: "Segoe Fluent Icons";
font-size: 1.6rem;
text-decoration: none;
color: var(--text);
transition: color 0.2s ease, transform 0.2s ease;
}

.footer-icon:hover {
color: var(--accent);
transform: translateY(-3px);
}

.footer-text {
font-size: 0.9rem;
opacity: 0.8;
}

/* AJUSTES PARA MÓVILES */
@media (max-width: 480px) {
body {
padding: 16px;
}
.hero-image {
margin: 20px 0 30px 0;
}
.theme-switcher {
flex-direction: column;
gap: 8px;
}
}

</style>

</head>

<body data-theme="dark">

<button class="theme-toggle" data-set-theme="light" title="Cambiar a modo claro">☀️</button>

<h1>Identidad vs. cuenta vs. credencial: el triángulo que define la seguridad moderna</h1>

<div class="hero-image">
<img src="img/1774429023296.jpeg" alt="Diagrama ilustrativo de identidad, cuenta y credencial" style="max-width:100%; height:auto;">
</div>

<p>Este artículo explica, desde una perspectiva arquitectónica, la diferencia entre identidad, cuenta y credencial...</p>

<!-- (todo tu contenido permanece intacto) -->

<!-- FOOTER INTEGRADO -->
<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-icons">
            <a href="https://github.com/juliocesarabreup" aria-label="GitHub" class="footer-icon"></a>
            <a href="https://www.linkedin.com/in/julio-abreu-p/" aria-label="LinkedIn" class="footer-icon"></a>
            <a href="mailto:juliocesarabreup@gmail.com" aria-label="Email" class="footer-icon"></a>
        </div>

        <p class="footer-text">
            © 2025 · SEC-ARCHITECT · Arquitectura, seguridad y diseño estratégico
        </p>
    </div>
</footer>

<script>
document.querySelectorAll("[data-set-theme]").forEach(btn => {
btn.addEventListener("click", () => {
const theme = btn.getAttribute("data-set-theme");
document.body.setAttribute("data-theme", theme);

// Toggle the button
if (theme === "light") {
btn.setAttribute("data-set-theme", "dark");
btn.textContent = "🌙";
btn.title = "Cambiar a modo oscuro";
} else {
btn.setAttribute("data-set-theme", "light");
btn.textContent = "☀️";
btn.title = "Cambiar a modo claro";
}
});
});
</script>

</body>
</html>
