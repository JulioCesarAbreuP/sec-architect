<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Identidad vs Cuenta vs Credencial</title>

<!-- Seguridad y buenas prácticas -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'self'; upgrade-insecure-requests;" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="X-Frame-Options" content="DENY" />
<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
<meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains" />
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta name="description" content="Diferencia arquitectónica entre identidad, cuenta y credencial. El modelo mental correcto para diseñar seguridad moderna." />

<style>

/* VARIABLES BASE */
:root {
--bg: #fafafa;
--text: #1a1a1a;
--card: #ffffff;
--accent: #0078d4;
}

/* MODO OSCURO */
[data-theme="dark"] {
--bg: #0f0f0f;
--text: #e6e6e6;
--card: #1a1a1a;
--accent: #4da3ff;
}

/* BASE */
body {
background: var(--bg);
color: var(--text);
font-family: "Segoe UI", system-ui, sans-serif;
max-width: 820px;
margin: 0 auto;
padding: 20px;
line-height: 1.75;
transition: background 0.3s ease, color 0.3s ease;
}

/* BOTÓN DE TEMA — AHORA SVG */
.theme-toggle {
position: absolute;
top: 0;
right: 0;
background: none;
border: none;
cursor: pointer;
padding: 0.5rem;
border-radius: 6px;
}

.theme-toggle svg {
width: 26px;
height: 26px;
stroke: var(--text);
transition: stroke 0.3s ease;
}

.theme-toggle:hover svg {
stroke: var(--accent);
}

/* FOOTER */
.site-footer {
margin-top: 60px;
padding: 40px 0 30px 0;
text-align: center;
color: var(--text);
opacity: 0.85;
}

.footer-content {
display: flex;
flex-direction: column;
align-items: center;
gap: 18px;
}

.footer-icons {
display: flex;
gap: 22px;
}

.footer-icon {
font-family: "Segoe Fluent Icons";
font-size: 1.6rem;
text-decoration: none;
color: var(--text);
transition: color 0.2s ease, transform 0.2s ease;
}

.footer-icon:hover {
color: var(--accent);
transform: translateY(-3px);
}

.footer-text {
font-size: 0.9rem;
opacity: 0.8;
}

</style>

</head>

<body data-theme="dark">

<!-- BOTÓN SVG (NO EMOJI) -->
<button class="theme-toggle" data-set-theme="light" title="Cambiar tema">
    <!-- Sol -->
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
    </svg>
</button>

<h1>Identidad vs. cuenta vs. credencial: el triángulo que define la seguridad moderna</h1>

<div class="hero-image">
<img src="img/1774429023296.jpeg" alt="Diagrama ilustrativo de identidad, cuenta y credencial" style="max-width:100%; height:auto;">
</div>

<p>Este artículo explica, desde una perspectiva arquitectónica, la diferencia entre identidad, cuenta y credencial...</p>

<!-- FOOTER -->
<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-icons">
            <a href="https://github.com/juliocesarabreup" aria-label="GitHub" class="footer-icon"></a>
            <a href="https://www.linkedin.com/in/julio-abreu-p/" aria-label="LinkedIn" class="footer-icon"></a>
            <a href="mailto:juliocesarabreup@gmail.com" aria-label="Email" class="footer-icon"></a>
        </div>

        <p class="footer-text">
            © 2025 · SEC-ARCHITECT · Arquitectura, seguridad y diseño estratégico
        </p>
    </div>
</footer>

<script>
document.querySelectorAll("[data-set-theme]").forEach(btn => {
btn.addEventListener("click", () => {
const theme = btn.getAttribute("data-set-theme");
document.body.setAttribute("data-theme", theme);

// Cambiar icono dinámicamente
if (theme === "light") {
btn.setAttribute("data-set-theme", "dark");
btn.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6">
<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
</svg>`;
} else {
btn.setAttribute("data-set-theme", "light");
btn.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6">
<circle cx="12" cy="12" r="5"/>
<path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
</svg>`;
}
});
});
</script>

</body>
</html>
