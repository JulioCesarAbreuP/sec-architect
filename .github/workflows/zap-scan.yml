# GitHub Actions workflow: OWASP ZAP scan on main deploy
# Ejecuta un escaneo activo contra la web publicada tras Front Door y sube el reporte como artefacto

name: OWASP ZAP Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'https://www.tudominio.com/'
          fail_action: false
          rules_file_name: ''
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.html
